version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env.local
    volumes:
      - backend-db:/app/data
    environment:
      - DB_PATH=/app/data/kisan_sahayak.db
      - PYTHONUNBUFFERED=1

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - NEXT_TELEMETRY_DISABLED=1
      # Note: Next.js API requests are routed via rewriting inside next.config.ts.
      # If running locally/within docker context, we map the rewrite.
      - BACKEND_URL=http://backend:8000

volumes:
  backend-db:
